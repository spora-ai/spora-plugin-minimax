name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run Pest
        run: ./vendor/bin/pest

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

  code-style:
    name: php-cs-fixer (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        # Dry-run (--dry-run) reports violations without rewriting files.
        # Same ruleset as Spora core's `.php-cs-fixer.php` so plugin style matches host.
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
