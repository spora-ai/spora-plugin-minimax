sonar.projectKey=spora-ai_spora-plugin-minimax
sonar.organization=spora-ai
sonar.projectName=spora-plugin-minimax
sonar.projectVersion=0.1.0

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/vendor/**,**/node_modules/**

# Coverage scope. SonarCloud logs "No filter is configured" when neither
# `sonar.coverage.exclusions` nor `sonar.coverage.inclusions` is set, even
# though `sonar.sources` already narrows the analysis. Excluding the
# tests/Support/ fixtures keeps the coverage surface scoped to the
# production code under test.
sonar.coverage.exclusions=**/tests/Support/**

# PHP test coverage (clover XML produced by the `coverage` CI job)
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=build/logs/junit.xml

# Source encoding
sonar.sourceEncoding=UTF-8

# Duplication detection — the 4 MiniMax*Tool.php files share an identical
# attach*MediaArchive() helper pattern (added in PR #17). The duplication is
# structural and intentional: these are the canonical 4 MiniMax tool classes
# and share the same MediaArchive attachment pattern by design. Excluding them
# from CPD removes false-positive copy-paste matches while preserving all
# other SonarQube analysis (complexity, coverage, maintainability).
sonar.cpd.exclusions=src/Tools/MiniMax*Tool.php
